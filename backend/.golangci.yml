version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - misspell
    - unparam
    - unused
    - gosec
    - gocritic
    - revive
    - nilerr
    - bodyclose
    - goconst
    - prealloc
    - exhaustive
    - noctx
  settings:
    goconst:
      min-occurrences: 4
      ignore-tests: true
    gosec:
      excludes:
        - G117

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go$
      linters:
        - errcheck
        - goconst
