# Capacitarr GitLab CI/CD Pipeline
#
# On every push and MR: lint → test → build → security (smoke test, no publish)
# On tag push (v*):     changelog → goreleaser (binaries + GitLab release)
#                                 → docker push (multi-arch to GitLab CR)
#                                 → pages (rebuild project site)

stages:
  - lint
  - test
  - build
  - security
  - release
  - pages

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:go:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - cd backend && golangci-lint run ./...

lint:frontend:
  stage: lint
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm lint

# ── Test ──────────────────────────────────────────────────────────────────────

test:go:
  stage: test
  image: golang:1.25-alpine
  script:
    - cd backend && go test ./... -race -count=1

test:frontend:
  stage: test
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm test

# ── Build ─────────────────────────────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker buildx create --use --driver docker-container
  script:
    - docker buildx build --platform linux/amd64,linux/arm64 .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Security ──────────────────────────────────────────────────────────────────

security:govulncheck:
  stage: security
  image: golang:1.25-alpine
  before_script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - cd backend && govulncheck ./...
  allow_failure: true

security:pnpm-audit:
  stage: security
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm audit
  allow_failure: true

# ── Release (tag-triggered) ──────────────────────────────────────────────────

# Extract release notes from the committed CHANGELOG.md for the tagged version
changelog:
  stage: release
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  script:
    - git cliff --latest --strip header > release_notes.md
    - cat release_notes.md
  artifacts:
    paths:
      - release_notes.md
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Build cross-compiled binaries and create GitLab release with asset uploads
release:goreleaser:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  dependencies:
    - changelog
  before_script:
    # GoReleaser needs Node.js + pnpm for the frontend build hook
    - apk add --no-cache nodejs npm
    - npm install -g corepack
    - corepack enable && corepack prepare pnpm@10.29.3 --activate
  script:
    - cat release_notes.md
    - goreleaser release --clean --release-notes release_notes.md
  rules:
    - if: $CI_COMMIT_TAG

# Build and push multi-arch Docker images to GitLab Container Registry
release:docker:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker buildx create --use --driver docker-container
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      # Extract version components from tag (e.g., v0.2.0 → 0, 0.2, 0.2.0)
      VERSION=${CI_COMMIT_TAG#v}
      MAJOR=$(echo "$VERSION" | cut -d. -f1)
      MINOR=$(echo "$VERSION" | cut -d. -f1-2)

      IMAGE="${CI_REGISTRY_IMAGE}"

      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg APP_VERSION="${CI_COMMIT_TAG}" \
        --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --build-arg COMMIT_SHA="${CI_COMMIT_SHORT_SHA}" \
        --tag "${IMAGE}:latest" \
        --tag "${IMAGE}:${MAJOR}" \
        --tag "${IMAGE}:${MINOR}" \
        --tag "${IMAGE}:${VERSION}" \
        --push \
        .
  rules:
    - if: $CI_COMMIT_TAG

# ── Pages ─────────────────────────────────────────────────────────────────────

pages:
  stage: pages
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd site && pnpm install --frozen-lockfile
  script:
    - cd site
    # Sync docs, screenshots, and changelog
    - node scripts/sync-docs.mjs
    # Copy favicon
    - cp ../frontend/public/favicon.ico public/favicon.ico 2>/dev/null || true
    # Build static site (SITE_BASE_URL defaults to '/' for capacitarr.app)
    - pnpm generate
    - mv .output/public/ ../public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
